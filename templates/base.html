<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FLEXCUBE Screen Tester{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d2230;
      --border: #2a3142;
      --text: #e6e8ee;
      --muted: #8c93a3;
      --accent: #5b8def;
      --accent-soft: rgba(91, 141, 239, 0.15);
      --success: #4ade80;
      --danger: #f87171;
      --mono: ui-monospace, SFMono-Regular, "Cascadia Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14.5px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }
    header.top {
      display: flex; align-items: baseline; justify-content: space-between;
      padding-bottom: 18px; margin-bottom: 28px; border-bottom: 1px solid var(--border);
    }
    header.top h1 { font-size: 18px; margin: 0; letter-spacing: 0.2px; }
    header.top h1 a { color: var(--text); text-decoration: none; }
    header.top nav a {
      color: var(--muted); text-decoration: none; margin-left: 18px; font-size: 13px;
    }
    header.top nav a:hover { color: var(--text); }
    h2 { font-size: 16px; margin: 32px 0 14px; letter-spacing: 0.2px; }
    h3 { font-size: 13.5px; margin: 22px 0 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
    a { color: var(--accent); }
    .panel {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 22px 22px;
    }
    .panel + .panel { margin-top: 18px; }
    .muted { color: var(--muted); }
    .mono { font-family: var(--mono); font-size: 12.8px; }
    .pill {
      display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11.5px;
      background: var(--accent-soft); color: var(--accent); margin-right: 6px;
    }
    .pill.warn { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
    .pill.ok   { background: rgba(74, 222, 128, 0.15); color: var(--success); }

    label { display: block; margin-bottom: 14px; }
    label > span { display: block; margin-bottom: 6px; color: var(--muted); font-size: 12.5px; }
    input[type="text"], input[type="file"] {
      width: 100%; padding: 10px 12px; background: var(--panel-2);
      color: var(--text); border: 1px solid var(--border); border-radius: 8px;
      font: inherit;
    }
    input[type="text"]:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    button, .btn {
      display: inline-block; padding: 9px 16px; background: var(--accent); color: white;
      border: 0; border-radius: 8px; font: inherit; font-weight: 600; cursor: pointer;
      text-decoration: none;
    }
    button.ghost, .btn.ghost {
      background: transparent; color: var(--text); border: 1px solid var(--border);
    }
    button.danger, .btn.danger {
      background: transparent; color: var(--danger); border: 1px solid var(--border);
    }
    button:hover { filter: brightness(1.08); }

    table { width: 100%; border-collapse: collapse; margin-top: 6px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 500; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.4px; }
    tr:hover td { background: rgba(255, 255, 255, 0.02); }

    .flash {
      padding: 10px 14px; border-radius: 8px; margin-bottom: 18px; font-size: 13.5px;
      border: 1px solid var(--border);
    }
    .flash.error   { background: rgba(248, 113, 113, 0.10); color: var(--danger); border-color: rgba(248,113,113,0.4); }
    .flash.success { background: rgba(74, 222, 128, 0.10); color: var(--success); border-color: rgba(74,222,128,0.4); }

    pre.code {
      background: #0a0c11; border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 16px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px;
      color: #cfd3dd; max-height: 420px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }

    .meta-row { display: flex; gap: 18px; align-items: baseline; flex-wrap: wrap; }
    .meta-row .k { color: var(--muted); font-size: 12.5px; }
    .meta-row .v { font-family: var(--mono); }

    .row-actions form { display: inline; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1><a href="{{ url_for('index') }}">FLEXCUBE Screen Tester</a></h1>
      <nav>
        <a href="{{ url_for('index') }}">Upload</a>
        <a href="{{ url_for('screens_list') }}">History</a>
      </nav>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
